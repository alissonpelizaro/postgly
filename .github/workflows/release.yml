name: Release

# Push a version tag (e.g. `v0.1.0`) to build installers for every OS
# and attach them to a GitHub Release.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-13 # Intel
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ""
            args: ""
          - platform: windows-latest
            target: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libxdo-dev libssl-dev

      - run: npm ci

      # Builds the app and uploads the bundles to a draft GitHub Release.
      # Code signing / notarization is intentionally not configured yet —
      # the installers are unsigned.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Postgly ${{ github.ref_name }}
          releaseBody: Baixe o instalador correspondente ao seu sistema operacional.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
