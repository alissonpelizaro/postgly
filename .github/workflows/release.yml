name: Release

# Push a version tag (e.g. `v0.1.0`) to build installers for every OS
# and attach them to a GitHub Release.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest # Intel (cross-compiled from arm64 host)
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ""
            args: ""
          - platform: windows-latest
            target: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libxdo-dev libssl-dev

      - run: npm ci

      # Builds the app and uploads the bundles to a draft GitHub Release.
      # Code signing / notarization is intentionally not configured yet —
      # the installers are unsigned.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Postgly ${{ github.ref_name }}
          releaseBody: Baixe o instalador correspondente ao seu sistema operacional.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # After all platform builds finish, mirror each installer with a
  # version-less filename so README links can point directly at
  # `releases/latest/download/<stable-name>`.
  mirror-stable-names:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Mirror assets with stable filenames
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir mirror && cd mirror
          gh release download "$TAG" -R "$REPO" --skip-existing
          shopt -s nullglob
          declare -A map=(
            ["Postgly_*_aarch64.dmg"]="Postgly-macos-arm64.dmg"
            ["Postgly_*_x64.dmg"]="Postgly-macos-x64.dmg"
            ["Postgly_*_x86_64.dmg"]="Postgly-macos-x64.dmg"
            ["Postgly_*_amd64.AppImage"]="Postgly-linux-x86_64.AppImage"
            ["Postgly_*_amd64.deb"]="Postgly-linux-amd64.deb"
            ["Postgly-*.x86_64.rpm"]="Postgly-linux-x86_64.rpm"
            ["Postgly_*_x64-setup.exe"]="Postgly-windows-x64-setup.exe"
            ["Postgly_*_x64_en-US.msi"]="Postgly-windows-x64.msi"
          )
          uploads=()
          for pattern in "${!map[@]}"; do
            for src in $pattern; do
              dest="${map[$pattern]}"
              cp -f "$src" "$dest"
              uploads+=("$dest")
            done
          done
          if [ ${#uploads[@]} -gt 0 ]; then
            gh release upload "$TAG" "${uploads[@]}" --clobber -R "$REPO"
          fi
