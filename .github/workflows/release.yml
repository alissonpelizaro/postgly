name: Release

# Push a version tag (e.g. `v0.1.0`) to build installers for every OS
# and attach them to a GitHub Release.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest # Intel (cross-compiled from arm64 host)
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ""
            args: ""
          - platform: windows-latest
            target: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libxdo-dev libssl-dev

      - run: npm ci

      # Sync project version with the pushed tag so generated bundles
      # carry the right version in their filename (e.g. v0.1.1 → 0.1.1).
      # Patches package.json, src-tauri/tauri.conf.json, src-tauri/Cargo.toml.
      - name: Sync version from tag
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          export VERSION="${REF_NAME#v}"
          echo "Setting project version to $VERSION"
          npm pkg set version="$VERSION"
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.version=process.env.VERSION;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"
          # Replace only the first version line (the [package] one)
          node -e "const fs=require('fs');const p='src-tauri/Cargo.toml';let s=fs.readFileSync(p,'utf8');s=s.replace(/^version = \"[^\"]+\"/m,'version = \"'+process.env.VERSION+'\"');fs.writeFileSync(p,s);"

      # Builds the app and uploads the bundles to a draft GitHub Release.
      # Code signing / notarization is intentionally not configured yet —
      # the installers are unsigned.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Postgly ${{ github.ref_name }}
          releaseBody: Baixe o instalador correspondente ao seu sistema operacional.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # After all platform builds finish, rename each installer to a stable,
  # version-less filename. README links can then point directly at
  # `releases/latest/download/<stable-name>`. The original versioned
  # assets are deleted so the release page only shows clean names.
  rename-stable-names:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Rename release assets to stable filenames
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir work && cd work
          gh release download "$TAG" -R "$REPO"
          shopt -s nullglob
          declare -A map=(
            ["Postgly_*_aarch64.dmg"]="Postgly-macos-arm64.dmg"
            ["Postgly_*_x64.dmg"]="Postgly-macos-x64.dmg"
            ["Postgly_*_x86_64.dmg"]="Postgly-macos-x64.dmg"
            ["Postgly_*_amd64.AppImage"]="Postgly-linux-x86_64.AppImage"
            ["Postgly_*_amd64.deb"]="Postgly-linux-amd64.deb"
            ["Postgly-*.x86_64.rpm"]="Postgly-linux-x86_64.rpm"
            ["Postgly_*_x64-setup.exe"]="Postgly-windows-x64-setup.exe"
            ["Postgly_*_x64_en-US.msi"]="Postgly-windows-x64.msi"
          )
          uploads=()
          originals=()
          for pattern in "${!map[@]}"; do
            for src in $pattern; do
              dest="${map[$pattern]}"
              # Skip if src is already the stable name (idempotent reruns)
              if [ "$src" = "$dest" ]; then continue; fi
              cp -f "$src" "$dest"
              uploads+=("$dest")
              originals+=("$src")
            done
          done
          if [ ${#uploads[@]} -gt 0 ]; then
            gh release upload "$TAG" "${uploads[@]}" --clobber -R "$REPO"
            for orig in "${originals[@]}"; do
              gh release delete-asset "$TAG" "$orig" -R "$REPO" --yes || true
            done
          fi
